<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Task Scheduler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#7F77DD;--accent2:#534AB7;--danger:#e74c3c;--success:#2ecc71}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f8;min-height:100vh}
 
/* Auth */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.auth-box h2{text-align:center;font-size:24px;color:#333;margin-bottom:8px}
.auth-box .sub{text-align:center;color:#888;font-size:14px;margin-bottom:28px}
.auth-box input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;transition:border .2s}
.auth-box input:focus{border-color:var(--accent)}
.auth-box .btn-main{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.auth-box .btn-main:hover{background:var(--accent2)}
.auth-box .btn-switch{width:100%;padding:11px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:10px;font-size:14px;cursor:pointer;margin-top:10px}
.auth-box .err{color:var(--danger);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
 
/* Dashboard */
#dashboard{display:none;max-width:1100px;margin:0 auto;padding:24px}
.topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:16px 24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.topbar h1{font-size:20px;color:#333}
.user-info{display:flex;align-items:center;gap:14px}
.user-info span{color:var(--accent);font-weight:600;font-size:15px}
.logout-btn{background:var(--danger);color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px}
 
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.stat-label{font-size:12px;color:#999;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:26px;font-weight:700;color:#333}
.stat-val.red{color:var(--danger)}
.stat-val.green{color:var(--success)}
.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
 
/* Tabs */
.tabs{display:flex;gap:4px;background:#fff;border-radius:12px;padding:5px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.tab{flex:1;padding:9px;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:500;color:#999;cursor:pointer;transition:all .2s}
.tab.active{background:var(--accent);color:#fff}
 
/* Panels */
.panel{display:none}.panel.active{display:block}
 
/* Add/Edit Task */
.task-form-card{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.task-form-card h3{font-size:16px;font-weight:600;color:#333;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500}
.task-form-card input,
.task-form-card select,
.task-form-card textarea{width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:9px;font-size:14px;outline:none;transition:border .2s}
.task-form-card input:focus,
.task-form-card select:focus,
.task-form-card textarea:focus{border-color:var(--accent)}
.task-form-card textarea{resize:vertical;min-height:60px}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn{padding:9px 20px;border-radius:9px;border:1px solid #ddd;background:transparent;color:#555;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn:hover{background:#f5f5f5}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent2)}
.btn.danger{border-color:#fcc;color:var(--danger)}
.btn.danger:hover{background:#fff0f0}
.btn.sm{padding:6px 12px;font-size:12px}
 
/* Filters */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid #e0e0e0;border-radius:9px;font-size:13px;background:#fff;outline:none}
.filter-bar select{width:auto}
.filter-bar input{width:200px}
 
/* Task list */
.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{background:#fff;border-radius:12px;padding:16px 20px;display:grid;grid-template-columns:26px 1fr auto;gap:14px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s,box-shadow .15s;border-left:4px solid transparent}
.task-item:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.task-item.done{opacity:.55;background:#fafafa}
.task-item.overdue{border-left-color:var(--danger)}
.task-item.p1{border-left-color:#e74c3c}
.task-item.p2{border-left-color:#e67e22}
.task-item.p3{border-left-color:#f1c40f}
.task-item.p4{border-left-color:#3498db}
.task-item.p5{border-left-color:#9b59b6}
.chk{width:22px;height:22px;border:2px solid #ddd;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.chk:hover{border-color:var(--accent)}
.chk.checked{background:var(--accent);border-color:var(--accent)}
.chk.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.task-name{font-size:16px;font-weight:600;color:#333;margin-bottom:4px}
.task-item.done .task-name{text-decoration:line-through;color:#aaa}
.task-desc{font-size:13px;color:#888;margin-bottom:8px}
.task-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge.p1{background:#fdecea;color:#c0392b}
.badge.p2{background:#fef5e7;color:#d35400}
.badge.p3{background:#fefde7;color:#b7950b}
.badge.p4{background:#eaf3fd;color:#2874a6}
.badge.p5{background:#f4ecfd;color:#7d3c98}
.badge.cat{background:#f0f2f8;color:#555}
.badge.overdue{background:#fdecea;color:#c0392b}
.badge.done{background:#eafaf1;color:#1e8449}
.badge.tag{background:#f0f2f8;color:#666}
.meta-item{display:flex;align-items:center;gap:4px;color:#888}
.task-actions{display:flex;gap:6px;flex-shrink:0}
.empty{text-align:center;padding:48px;color:#aaa;font-size:15px}
 
/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kb-col{background:#f8f9fd;border-radius:12px;padding:14px}
.kb-head{font-size:13px;font-weight:700;color:#555;margin-bottom:12px;display:flex;justify-content:space-between}
.kb-count{background:#fff;border:1px solid #e5e5e5;border-radius:20px;padding:1px 9px;font-size:11px;color:#888}
.kb-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #eee;font-size:13px}
.kb-card .kname{font-weight:600;color:#333;margin-bottom:6px}
.kb-card .kmeta{font-size:11px;color:#999;margin-top:6px}
 
/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0;padding:8px 0}
.tl-item{display:grid;grid-template-columns:100px 2px 1fr;gap:0 16px;padding-bottom:20px}
.tl-date{font-size:12px;color:#999;text-align:right;padding-top:3px;line-height:1.4}
.tl-bar{background:#e0e0e0;position:relative}
.tl-bar::before{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:var(--accent)}
.tl-content{padding-bottom:4px}
.tl-title{font-size:15px;font-weight:600;color:#333}
.tl-sub{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
 
/* AI panel */
.ai-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ai-card h3{font-size:16px;font-weight:600;margin-bottom:6px;color:#333}
.ai-card p{font-size:13px;color:#888;margin-bottom:16px}
.ai-card textarea{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:10px;font-size:14px;min-height:90px;outline:none;resize:vertical}
.ai-card textarea:focus{border-color:var(--accent)}
.quick-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ai-result{margin-top:16px;background:#f8f9fd;border-radius:10px;padding:16px;font-size:14px;color:#333;line-height:1.8;white-space:pre-wrap;display:none;min-height:60px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr}
  .kanban{grid-template-columns:1fr}
  .task-item{grid-template-columns:26px 1fr;grid-template-rows:auto auto}
  .task-actions{grid-column:2;display:flex;gap:6px}
  .form-grid,.form-grid.three{grid-template-columns:1fr}
  .form-full{grid-column:1}
}
</style>
</head>
<body>
 
<!-- AUTH -->
<div id="authSection" class="auth-wrap">
  <div class="auth-box">
    <h2>📋 Task Scheduler</h2>
    <p class="sub">Priority-first, deadline-aware task management</p>
 
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
      <button class="btn-main" onclick="handleLogin()">Login</button>
      <button class="btn-switch" onclick="showRegister()">Create new account</button>
      <div id="loginErr" class="err"></div>
    </div>
 
    <div id="registerForm" style="display:none">
      <input type="text" id="regName" placeholder="Full Name">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
      <button class="btn-main" onclick="handleRegister()">Create Account</button>
      <button class="btn-switch" onclick="showLogin()">Back to login</button>
      <div id="regErr" class="err"></div>
    </div>
  </div>
</div>
 
<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <h1>📋 Smart Task Scheduler</h1>
    <div class="user-info">
      <span id="userName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
 
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val" id="sTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val green" id="sDone">—</div><div class="progress-bar"><div class="progress-fill" id="sProgress" style="width:0%"></div></div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-val red" id="sOverdue">—</div></div>
    <div class="stat-card"><div class="stat-label">Urgent (P1–P2)</div><div class="stat-val" id="sUrgent">—</div></div>
  </div>
 
  <div class="tabs">
    <button class="tab active" onclick="switchTab('list',this)">All Tasks</button>
    <button class="tab" onclick="switchTab('add',this)">+ Add Task</button>
    <button class="tab" onclick="switchTab('kanban',this)">Board</button>
    <button class="tab" onclick="switchTab('timeline',this)">Timeline</button>
    <button class="tab" onclick="switchTab('ai',this)">AI Assist</button>
  </div>
 
  <!-- LIST -->
  <div id="panel-list" class="panel active">
    <div class="filter-bar">
      <input id="searchInput" placeholder="🔍 Search tasks…" oninput="loadTasks()">
      <select id="filterPriority" onchange="loadTasks()">
        <option value="">All priorities</option>
        <option value="1">P1 — Critical</option>
        <option value="2">P2 — High</option>
        <option value="3">P3 — Medium</option>
        <option value="4">P4 — Low</option>
        <option value="5">P5 — Minimal</option>
      </select>
      <select id="filterCat" onchange="loadTasks()">
        <option value="">All categories</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Study">Study</option>
        <option value="Health">Health</option>
        <option value="Finance">Finance</option>
        <option value="Other">Other</option>
      </select>
      <select id="filterStatus" onchange="loadTasks()">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="done">Done</option>
        <option value="overdue">Overdue</option>
      </select>
      <select id="sortBy" onchange="loadTasks()">
        <option value="priority">Sort: Priority</option>
        <option value="deadline">Sort: Deadline</option>
        <option value="created">Sort: Newest</option>
        <option value="alpha">Sort: A–Z</option>
      </select>
      <button class="btn danger sm" onclick="clearCompleted()">Clear Completed</button>
    </div>
    <div id="taskList" class="task-list"></div>
  </div>
 
  <!-- ADD / EDIT -->
  <div id="panel-add" class="panel">
    <div class="task-form-card">
      <h3 id="formTitle">➕ Add New Task</h3>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-full">
          <label>Title *</label>
          <input id="fTitle" placeholder="Task name">
        </div>
        <div>
          <label>Priority</label>
          <select id="fPriority">
            <option value="1">P1 — Critical 🔴</option>
            <option value="2">P2 — High 🟠</option>
            <option value="3" selected>P3 — Medium 🟡</option>
            <option value="4">P4 — Low 🔵</option>
            <option value="5">P5 — Minimal 🟣</option>
          </select>
        </div>
        <div>
          <label>Category</label>
          <select id="fCat">
            <option>Work</option><option>Personal</option>
            <option>Study</option><option>Health</option>
            <option>Finance</option><option>Other</option>
          </select>
        </div>
        <div>
          <label>Deadline *</label>
          <input type="datetime-local" id="fDeadline">
        </div>
        <div>
          <label>Estimated time (minutes)</label>
          <input type="number" id="fTime" placeholder="e.g. 60" min="1">
        </div>
        <div class="form-full">
          <label>Description</label>
          <textarea id="fDesc" placeholder="Optional notes or details…"></textarea>
        </div>
        <div class="form-full">
          <label>Tags (comma-separated)</label>
          <input id="fTags" placeholder="e.g. urgent, meeting, report">
        </div>
        <div class="form-full">
          <label>Dependencies (task titles, comma-separated)</label>
          <input id="fDeps" placeholder="e.g. Research phase, Draft outline">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="saveTask()">Save Task</button>
        <button class="btn" onclick="resetForm(); switchTab('list', document.querySelector('.tab'))">Cancel</button>
      </div>
      <div id="formErr" style="color:var(--danger);font-size:13px;margin-top:10px"></div>
    </div>
  </div>
 
  <!-- KANBAN -->
  <div id="panel-kanban" class="panel">
    <div class="kanban" id="kanbanBoard"></div>
  </div>
 
  <!-- TIMELINE -->
  <div id="panel-timeline" class="panel">
    <div id="timelineView" class="timeline"></div>
  </div>
 
  <!-- AI ASSIST -->
  <div id="panel-ai" class="panel">
    <div class="ai-card">
      <h3>🤖 AI Task Assistant</h3>
      <p>Ask anything about your tasks — get scheduling advice, priority recommendations, or a daily plan.</p>
      <textarea id="aiPrompt" placeholder="e.g. What should I focus on today? Which tasks are most at risk?"></textarea>
      <div class="btn-row">
        <button class="btn primary" onclick="askAI()">Ask AI →</button>
      </div>
      <div class="quick-btns">
        <button class="btn sm" onclick="quickAsk('What should I tackle first today based on priority and deadlines?')">What to do first?</button>
        <button class="btn sm" onclick="quickAsk('Create a time-blocked daily schedule based on my pending tasks and estimated times.')">Daily schedule</button>
        <button class="btn sm" onclick="quickAsk('Which tasks are overdue or at risk? What should I do about them?')">Risk check</button>
        <button class="btn sm" onclick="quickAsk('Summarize all my tasks in a brief status report.')">Status report</button>
      </div>
      <div id="aiResult" class="ai-result"></div>
    </div>
  </div>
</div>
 <script>
const API = 'http://localhost:3000';

let token = localStorage.getItem('sts_token');
let currentUser = JSON.parse(localStorage.getItem('sts_user') || 'null');
let allTasks = [];

if (token) initDashboard();


// ─── AUTH ─────────────────────────────

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';

  if (!email || !password) {
    err.textContent = 'Fill all fields';
    return;
  }

  try {
    const res = await fetch(`${API}/login`, {   // ✅ FIXED
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Login failed';
      return;
    }

    storeAuth(data);
    initDashboard();

  } catch {
    err.textContent = 'Backend not reachable';
  }
}


async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const err = document.getElementById('regErr');
  err.textContent = '';

  if (!name || !email || !password) {
    err.textContent = 'Fill all fields';
    return;
  }

  try {
    const res = await fetch(`${API}/register`, {   // ✅ FIXED
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Register failed';
      return;
    }

    storeAuth(data);
    initDashboard();

  } catch {
    err.textContent = 'Backend not reachable';
  }
}


// ─── STORAGE ──────────────────────────

function storeAuth(data) {
  token = data.token;
  currentUser = data.user;
  localStorage.setItem('sts_token', token);
  localStorage.setItem('sts_user', JSON.stringify(currentUser));
}


// ─── DASHBOARD ────────────────────────

function initDashboard() {
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('userName').textContent = `👋 ${currentUser?.name}`;
  loadTasks();
}


// ─── TASKS ────────────────────────────

async function loadTasks() {
  try {
    const res = await apiFetch('/tasks');

    if (!res.ok) {
      if (res.status === 401) logout();
      return;
    }

    allTasks = await res.json();
    renderTasks();

  } catch (e) {
    console.log(e);
  }
}


async function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  const deadline = document.getElementById('fDeadline').value;

  if (!title || !deadline) {
    alert("Title & deadline required");
    return;
  }

  const body = {
    title,
    priority: parseInt(document.getElementById('fPriority').value),
    deadline
  };

  const res = await apiFetch('/tasks', {
    method: 'POST',
    body: JSON.stringify(body)
  });

  if (res.ok) loadTasks();
}


async function toggleTask(id) {
  await apiFetch(`/tasks/${id}/toggle`, { method: 'PUT' });
  loadTasks();
}


async function deleteTask(id) {
  await apiFetch(`/tasks/${id}`, { method: 'DELETE' });
  loadTasks();
}


// ─── RENDER ───────────────────────────

function renderTasks() {
  const el = document.getElementById('taskList');

  if (!allTasks.length) {
    el.innerHTML = "<div>No tasks</div>";
    return;
  }

  el.innerHTML = allTasks.map(t => `
    <div style="background:#fff;padding:10px;margin:10px;border-radius:8px">
      <b>${t.title}</b> (P${t.priority})
      <br>
      <button onclick="toggleTask('${t._id}')">✔ Done</button>
      <button onclick="deleteTask('${t._id}')">❌ Delete</button>
    </div>
  `).join('');
}


// ─── HELPERS ──────────────────────────

function apiFetch(path, opts = {}) {
  return fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    }
  });
}


function logout() {
  localStorage.clear();
  location.reload();
}
function switchTab(pane, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  if (btn) btn.classList.add('active');

  const panel = document.getElementById(`panel-${pane}`);
  if (panel) panel.classList.add('active');

  // ✅ ADD THESE
  if (pane === 'kanban') renderKanban();
  if (pane === 'timeline') renderTimeline();
}
function askAI() {
  document.getElementById('aiResult').style.display = 'block';
  document.getElementById('aiResult').textContent = "AI not connected yet.";
}

function quickAsk(text) {
  document.getElementById('aiPrompt').value = text;
  askAI();
}
function renderKanban() {
  const pending = allTasks.filter(t => !t.completed && new Date(t.deadline) >= new Date());
  const overdue = allTasks.filter(t => !t.completed && new Date(t.deadline) < new Date());
  const done = allTasks.filter(t => t.completed);

  const createCol = (title, list) => `
    <div class="kb-col">
      <div class="kb-head">${title} <span class="kb-count">${list.length}</span></div>
      ${
        list.length
          ? list.map(t => `
            <div class="kb-card">
              <div class="kname">${t.title}</div>
              <div class="kmeta">📅 ${new Date(t.deadline).toLocaleString()}</div>
            </div>
          `).join('')
          : '<div style="color:#aaa;font-size:13px">No tasks</div>'
      }
    </div>
  `;

  document.getElementById('kanbanBoard').innerHTML =
    createCol('📌 Pending', pending) +
    createCol('⚠️ Overdue', overdue) +
    createCol('✅ Done', done);
}
function renderTimeline() {
  const el = document.getElementById('timelineView');

  if (!allTasks.length) {
    el.innerHTML = "<div>No tasks</div>";
    return;
  }

  const sorted = [...allTasks].sort(
    (a, b) => new Date(a.deadline) - new Date(b.deadline)
  );

  el.innerHTML = sorted.map(t => `
    <div class="tl-item">
      <div class="tl-date">
        ${new Date(t.deadline).toLocaleString()}
      </div>
      <div class="tl-bar"></div>
      <div class="tl-content">
        <div class="tl-title">${t.title}</div>
        <div style="font-size:12px;color:#888">
          Priority: P${t.priority} ${t.completed ? '✅ Done' : ''}
        </div>
      </div>
    </div>
  `).join('');
}
</script>

</body>
</html>
